<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JBP经营驾驶舱</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080c18;--border:#1e3a5f;--text:#e2e8f0;--muted:#64748b;
  --blue:#3b82f6;--purple:#8b5cf6;--cyan:#06b6d4;--green:#22c55e;
  --hh:52px;--th:54px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,'PingFang SC','Microsoft YaHei',Arial,sans-serif}

.header{height:var(--hh);position:fixed;top:0;left:0;right:0;z-index:200;
  background:linear-gradient(135deg,#0d1b35,#080c18);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:10px}
.logo{width:34px;height:34px;flex-shrink:0;background:linear-gradient(135deg,#2563eb,#7c3aed);
  border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;
  box-shadow:0 0 14px rgba(59,130,246,.35)}
.title h1{font-size:20px;font-weight:800;letter-spacing:.5px;
  background:linear-gradient(90deg,#fff 60%,#93c5fd);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.title p{font-size:9px;color:var(--muted);margin-top:1px}
.hdr-r{margin-left:auto;text-align:right;flex-shrink:0}
.hdr-d{font-size:9px;color:#93c5fd;font-weight:600}
.hdr-t{font-size:14px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;line-height:1.1}
.dot{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;
  box-shadow:0 0 6px var(--green);margin-right:4px;
  animation:pulse 2s ease-in-out infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

.tabs{height:var(--th);position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:#060c1a;border-top:1px solid var(--border);display:flex;align-items:stretch}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;color:var(--muted);padding:6px 2px;
  font-size:10px;font-weight:600;position:relative;user-select:none;
  -webkit-user-select:none;transition:color .2s;border:none;background:none}
.tab:active{background:rgba(59,130,246,.08)}
.tab.on{color:#fff}
.tab.on::after{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;border-radius:0 0 2px 2px}
.tab:nth-child(1).on::after{background:linear-gradient(90deg,var(--blue),var(--purple))}
.tab:nth-child(2).on::after{background:linear-gradient(90deg,var(--cyan),var(--green))}
.tab:nth-child(3).on::after{background:linear-gradient(90deg,#16a34a,#06b6d4)}
.ti{font-size:20px;line-height:1;transition:transform .15s}
.tab.on .ti{transform:scale(1.1)}

.wrap{position:fixed;top:var(--hh);left:0;right:0;bottom:var(--th);overflow:hidden}
.pane{position:absolute;inset:0;display:none}
.pane.on{display:block}
.pane iframe{width:100%;height:100%;border:none;display:block;background:var(--bg)}

.ld{position:absolute;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:9}
.ld.off{display:none}
.sp{width:38px;height:38px;border:3px solid rgba(59,130,246,.2);
  border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-size:11px;color:#94a3b8}

@media(min-width:640px){
  :root{--hh:58px;--th:46px}
  .tabs{top:var(--hh);bottom:auto;border-top:none;border-bottom:1px solid var(--border);
    background:linear-gradient(180deg,#0d1628,#0a1020);
    align-items:flex-end;padding:0 20px;gap:4px;height:var(--th)}
  .tab{flex:none;flex-direction:row;gap:7px;padding:8px 16px;font-size:12px;
    border-radius:8px 8px 0 0;position:relative;bottom:-1px;
    border:1px solid transparent;border-bottom:none}
  .tab:hover:not(.on){background:rgba(30,58,95,.2);border-color:rgba(30,58,95,.5);color:#94a3b8}
  .tab.on{color:#fff;background:var(--bg);border-color:var(--border);border-bottom-color:var(--bg)}
  .tab.on::after{top:0;left:0;right:0;bottom:auto;height:2px;border-radius:8px 8px 0 0}
  .ti{font-size:15px}
  .bge{display:inline-block;background:rgba(59,130,246,.15);
    border:1px solid rgba(59,130,246,.3);color:#93c5fd;
    border-radius:10px;padding:1px 7px;font-size:10px;margin-left:3px}
  .wrap{top:calc(var(--hh) + var(--th));bottom:22px}
  .title h1{font-size:22px}
  .hdr-t{font-size:17px}
  .sb{display:flex !important}
}

.sb{display:none;position:fixed;bottom:0;left:0;right:0;height:22px;z-index:200;
  background:#050810;border-top:1px solid rgba(30,58,95,.4);
  align-items:center;padding:0 14px;gap:14px}
.si{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.sd{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 4px var(--green)}
.sw{background:#f59e0b !important;box-shadow:0 0 4px #f59e0b !important}
.dv{width:1px;height:10px;background:var(--border)}
.sr{margin-left:auto;font-size:10px;color:var(--muted)}
.sr em{color:#93c5fd;font-style:normal}

@supports(padding-bottom:env(safe-area-inset-bottom)){
  @media(max-width:639px){
    .tabs{padding-bottom:env(safe-area-inset-bottom)}
    .wrap{bottom:calc(var(--th) + env(safe-area-inset-bottom))}
  }
}
</style>
</head>

var MODS=['经营健康度','大区入库进度','库存健康监控','缺货监控','KPI达成','关键项目'];
var blobUrls=[null,null,null,null,null,null];
var loaded=[false,false,false,false,false,false];
var cur=0;
function makeBlob(idx){
  if(blobUrls[idx]) return blobUrls[idx];
  var blob=new Blob([b64decode(PAGES_B64[idx])],{type:'text/html;charset=utf-8'});
  blobUrls[idx]=URL.createObjectURL(blob);
  return blobUrls[idx];
}
function loadPane(idx){
  if(loaded[idx]) return;
  loaded[idx]=true;
  var fr=document.getElementById('fr'+idx);
  var ld=document.getElementById('ld'+idx);
  var html;
  try{ html=b64decode(PAGES_B64[idx]); }
  catch(e){ if(ld) ld.textContent='解码错误: '+e; return; }

  // 方法1: contentDocument.write (最兼容，无需blob/srcdoc)
  try{
    var doc=fr.contentDocument||(fr.contentWindow&&fr.contentWindow.document);
    if(doc){
      doc.open('text/html','replace');
      doc.write(html);
      doc.close();
      if(ld) ld.className='ld off';
      return;
    }
  }catch(e1){}

  // 方法2: srcdoc
  try{
    fr.srcdoc=html;
    fr.onload=function(){ if(ld) ld.className='ld off'; };
    return;
  }catch(e2){}

  // 方法3: blob URL (降级)
  try{
    var blob=new Blob([html],{type:'text/html;charset=utf-8'});
    fr.src=URL.createObjectURL(blob);
    fr.onload=function(){ if(ld) ld.className='ld off'; };
  }catch(e3){
    if(ld) ld.textContent='加载失败，请用Chrome打开';
  }
}
function go(idx){
  if(idx===cur) return;
  document.getElementById('pane'+cur).className='pane';
  document.querySelectorAll('.tab')[cur].className='tab';
  cur=idx;
  document.getElementById('pane'+idx).className='pane on';
  document.querySelectorAll('.tab')[idx].className='tab on';
  var m=document.getElementById('mod');
  if(m) m.textContent=MODS[idx];
  loadPane(idx);
}
var D=['日','一','二','三','四','五','六'];
function tick(){
  var n=new Date();
  var hd=document.getElementById('hd');
  var ht=document.getElementById('ht');
  if(hd) hd.textContent=n.getFullYear()+'/'+(n.getMonth()+1)+'/'+n.getDate()+' 周'+D[n.getDay()];
  if(ht) ht.textContent=('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2);
}
tick(); setInterval(tick,30000);
document.addEventListener('keydown',function(e){
  if(e.key==='1') go(0);
  if(e.key==='2') go(1);
  if(e.key==='3') go(2);
});
loadPane(0);
</script>
